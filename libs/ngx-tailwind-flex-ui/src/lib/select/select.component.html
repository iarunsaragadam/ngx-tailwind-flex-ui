<div class="relative w-full" #trigger>
  <div class="relative">
    <input
      type="text"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [required]="required"
      [readonly]="true"
      [value]="displayValue"
      [tabIndex]="tabIndex"
      [attr.aria-label]="ariaLabel || null"
      [attr.aria-labelledby]="ariaLabelledby || null"
      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer pr-16"
      (click)="togglePanel($event)"
      (keydown)="handleKeydown($event)"
    />
    <div
      class="absolute right-3 top-1/2 transform -translate-y-1/2 flex items-center space-x-2"
    >
      <button
        *ngIf="value && !disabled"
        (click)="clearSelection($event)"
        class="text-gray-400 hover:text-gray-600 focus:outline-none"
        aria-label="Clear selection"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            clip-rule="evenodd"
          />
        </svg>
      </button>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5 text-gray-400 transition-transform duration-200"
        [class.rotate-180]="isOpen"
        viewBox="0 0 20 20"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          fill-rule="evenodd"
          d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
          clip-rule="evenodd"
        />
      </svg>
    </div>
  </div>

  <div
    *ngIf="isOpen"
    #panel
    class="absolute z-10 mt-1 w-full bg-white border border-gray-200 rounded-md shadow-lg overflow-hidden"
    [class]="panelClass"
    [class.max-h-60]="!panelClass"
    role="listbox"
    [attr.aria-multiselectable]="multiple"
    [attr.aria-activedescendant]="
      focusedOptionIndex >= 0 ? 'option-' + focusedOptionIndex : null
    "
  >
    <div
      *ngIf="showSearch()"
      class="sticky top-0 bg-white p-2 border-b border-gray-200"
    >
      <input
        #searchInput
        [(ngModel)]="searchText"
        class="w-full px-3 py-2 text-sm border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Search..."
        (click)="$event.stopPropagation()"
        aria-label="Filter options"
      />
    </div>

    <div class="overflow-y-auto max-h-[244px] min-h-[40px]">
      <ng-container *ngIf="loading">
        <div class="px-4 py-2 text-sm text-gray-500 text-center">
          Loading...
        </div>
      </ng-container>

      <ng-container
        *ngIf="!loading && filteredOptions.length > 0; else noOptions"
      >
        <ng-container
          *ngFor="let group of filteredOptions; let groupIndex = index"
        >
          <div
            *ngIf="group.group"
            class="px-4 py-1 text-xs font-semibold text-gray-500 bg-gray-50 border-b border-gray-200"
          >
            {{ group.group }}
          </div>
          <lib-select-option
            *ngFor="let option of group.options; let i = index"
            [value]="option.value"
            [label]="option.label"
            [disabled]="option.disabled"
            [selected]="isSelected(option)"
            (click)="selectOption(option, $event)"
            [id]="'option-' + (groupIndex * 1000 + i)"
            [class.bg-blue-100]="groupIndex * 1000 + i === focusedOptionIndex"
          >
            <ng-container *ngIf="multiple">
              <svg
                *ngIf="isSelected(option)"
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 mr-2 text-blue-600"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                  clip-rule="evenodd"
                />
              </svg>
              <span *ngIf="!isSelected(option)" class="w-5 mr-2"></span>
            </ng-container>
            {{ option.label }}
          </lib-select-option>
        </ng-container>
      </ng-container>

      <ng-template #noOptions>
        <div
          *ngIf="!loading"
          class="px-4 py-2 text-sm text-gray-500 text-center"
        >
          No options found
        </div>
      </ng-template>
    </div>
  </div>
</div>
